<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Diario de Aventuras ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght=0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg:         #0e0912;
    --cream:      #faf6f0;
    --rose:       #e8a7b6;
    --gold:       #e5c1b1;
    --sage:       #9cb69f;
    --card-bg:    rgba(42, 22, 38, 0.52);
    --card-border: rgba(229, 193, 177, 0.13);
    --muted:      rgba(250, 246, 240, 0.38);
  }

  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    min-height: 100dvh;
  }
  body { padding-bottom: env(safe-area-inset-bottom); }

  .glow-rose {
    position: fixed; top: -15%; right: -10%;
    width: 60vw; height: 60vw; max-width: 380px; max-height: 380px;
    background: radial-gradient(circle, rgba(232,167,182,.09) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .glow-purple {
    position: fixed; bottom: 5%; left: -15%;
    width: 55vw; height: 55vw; max-width: 340px; max-height: 340px;
    background: radial-gradient(circle, rgba(156,100,180,.07) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .glass {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--card-border);
    border-radius: 1.5rem;
    box-shadow: 0 2px 32px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.04);
  }

  select, input, textarea {
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(229,193,177,.10);
    border-radius: .875rem; color: var(--cream);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    outline: none; transition: all .2s;
  }
  select:focus, input:focus, textarea:focus { border-color: rgba(232,167,182,.4); }
  textarea::placeholder, input::placeholder { color: var(--muted); font-style: italic; }

  .btn-check {
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    padding: 0.75rem 1rem; border-radius: 0.875rem;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(229,193,177,.10);
    font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.2s;
  }
  .btn-check.active {
    background: rgba(232,167,182,.12); color: var(--rose);
    border-color: rgba(232,167,182,.35);
    box-shadow: 0 0 12px rgba(232,167,182,0.1);
  }

  .emoji-btn {
    font-size: 1.75rem; opacity: 0.35; filter: grayscale(40%); transition: all 0.15s; cursor: pointer;
  }
  .emoji-btn.active { opacity: 1; filter: grayscale(0%); transform: scale(1.2); }

  .section-label {
    font-size: .65rem; font-weight: 600; letter-spacing: .12em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 0.9rem;
  }

  .btn-submit {
    background: linear-gradient(135deg, rgba(232,167,182,.85) 0%, rgba(229,193,177,.75) 100%);
    color: #1a0e18; font-weight: 700; font-size: .95rem;
    letter-spacing: .03em; border-radius: 1.25rem;
    padding: 1rem 2rem; width: 100%; border: none;
    cursor: pointer; transition: opacity .2s, transform .15s;
    box-shadow: 0 4px 28px rgba(232,167,182,.20);
  }
  .btn-submit:active { transform: scale(.97); opacity: .88; }
  .btn-submit:disabled { opacity: .55; cursor: not-allowed; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(26,14,24,.3); border-top-color: #1a0e18;
    border-radius: 50%; animation: spin .7s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }

  .divider { height: 1px; background: rgba(229,193,177,.07); margin: 1.25rem 0; }
  .header-deco { display: flex; align-items: center; gap: .5rem; }
  .header-deco::before, .header-deco::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, rgba(229,193,177,.2), transparent);
  }
</style>
</head>
<body>

<div class="glow-rose"></div>
<div class="glow-purple"></div>

<div class="relative z-10 px-4 pt-16 pb-14 max-w-md mx-auto">

  <!-- Header -->
  <div class="mb-7 text-center">
    <p class="text-xs tracking-widest uppercase mb-3 header-deco" style="color:var(--muted)">
      <span id="weekLabel"></span>
    </p>
    <div class="text-3xl mb-2">🌿</div>
    <h1 class="text-2xl font-bold leading-tight" style="color:var(--cream)">Diario de Aventuras</h1>
    <p class="text-sm mt-1.5 font-light italic" style="color:var(--muted)">Bitácora Semanal de Rendimiento</p>
  </div>

  <form id="checkinForm" onsubmit="handleSubmit(event)">

    <!-- BLOQUE 1: COMPOSICIÓN CORPORAL -->
    <div class="glass p-5 mb-3">
      <p class="section-label">⚖️ Composición Corporal</p>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs block mb-1.5" style="color:var(--muted)">Peso (kg)</label>
          <input type="number" id="peso" step="0.1" placeholder="62.5" class="w-full p-2.5 text-sm text-center" required>
        </div>
        <div>
          <label class="text-xs block mb-1.5" style="color:var(--muted)">Altura (cm) <span class="opacity-50">(para IMC)</span></label>
          <input type="number" id="altura" placeholder="165" value="165" class="w-full p-2.5 text-sm text-center" required>
        </div>
        <div>
          <label class="text-xs block mb-1.5" style="color:var(--muted)">% Grasa</label>
          <input type="number" id="grasa" step="0.1" placeholder="22.4" class="w-full p-2.5 text-sm text-center">
        </div>
        <div>
          <label class="text-xs block mb-1.5" style="color:var(--muted)">% Músculo</label>
          <input type="number" id="musculo" step="0.1" placeholder="38.2" class="w-full p-2.5 text-sm text-center">
        </div>
      </div>
    </div>

    <!-- BLOQUE 2: SALUD, ENERGÍA Y CICLO -->
    <div class="glass p-5 mb-3">
      <p class="section-label">🩺 Salud, Energía y Ciclo</p>
      <div class="space-y-4">
        <div>
          <button type="button" id="menstruacionBtn" class="w-full btn-check" onclick="toggleActive(this)">
            🩸 Estoy con la Menstruación esta semana
          </button>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs block mb-1.5" style="color:var(--muted)">Calidad del Sueño</label>
            <select id="sueno" class="w-full p-2.5 text-sm">
              <option value="Reparador">🌿 Reparador</option>
              <option value="Interrumpido">🌙 Interrumpido</option>
              <option value="Insuficiente">🥀 Insuficiente</option>
            </select>
          </div>
          <div>
            <label class="text-xs block mb-1.5" style="color:var(--muted)">Energía / Fatiga (1-5)</label>
            <select id="energia" class="w-full p-2.5 text-sm">
              <option value="5">5 — A tope ⚡</option>
              <option value="4">4 — Buena energía ✨</option>
              <option value="3">3 — Normal 🌤️</option>
              <option value="2">2 — Cansada ☁️</option>
              <option value="1">1 — Agotada 🥀</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- BLOQUE 3: ENTRENAMIENTO -->
    <div class="glass p-5 mb-3">
      <p class="section-label">🏃 Registro de Entrenamiento</p>
      <div class="space-y-4">
        <div>
          <label class="text-xs block mb-1.5" style="color:var(--muted)">Actividad principal destacada</label>
          <select id="tipoEntreno" class="w-full p-2.5 text-sm">
            <option value="Nada">⚪ Nada</option>
            <option value="Caminar en asfalto">🚶 Caminar en asfalto</option>
            <option value="Correr en asfalto">🏃 Correr en asfalto</option>
            <option value="Senderismo montaña">🌲 Senderismo montaña</option>
            <option value="Correr por montaña">🏔️ Correr por montaña</option>
            <option value="Fuerza">🏋️ Fuerza / Gimnasio</option>
          </select>
        </div>
        <div>
          <label class="text-xs block mb-2" style="color:var(--muted)">¿Cómo se ha sentido el entrenamiento?</label>
          <div class="flex justify-around items-center bg-[rgba(255,255,255,0.02)] p-2 rounded-xl border border-[rgba(229,193,177,0.06)]">
            <button type="button" class="emoji-btn" id="emojiSad" onclick="setEmoji('Triste/Duro')">😭</button>
            <button type="button" class="emoji-btn" id="emojiNormal" onclick="setEmoji('Normal/Ok')">😐</button>
            <button type="button" class="emoji-btn" id="emojiHappy" onclick="setEmoji('Feliz/Fluido')">😊</button>
          </div>
        </div>
        <div>
          <label class="text-xs block mb-1.5" style="color:var(--muted)">Comentarios concretos de las sesiones</label>
          <textarea id="notasEntreno" rows="2" placeholder="Ej: Buenas marcas en sentadilla / Ritmo alegre en subida..." class="w-full px-3 py-2 text-sm"></textarea>
        </div>
      </div>
    </div>

    <!-- BLOQUE 4: INFLAMACIONES Y ALERTAS -->
    <div class="glass p-5 mb-3">
      <p class="section-label">🥑 Nutrición e Inflamaciones</p>
      <p class="text-xs font-semibold mb-2" style="color:var(--gold)">Digestiva / Nutricional:</p>
      <div class="grid grid-cols-2 gap-2 mb-4">
        <button type="button" class="btn-check inf-digestiva" data-val="Hinchazón/Gases" onclick="toggleActive(this)">💨 Hinchazón</button>
        <button type="button" class="btn-check inf-digestiva" data-val="Pesadez/Dolor de tripa" onclick="toggleActive(this)">⚡ Dolor tripa</button>
        <button type="button" class="btn-check inf-digestiva" data-val="Ir regular al baño" onclick="toggleActive(this)">🚽 Ir regular</button>
        <button type="button" class="btn-check inf-digestiva" data-val="Digestión pesada" onclick="toggleActive(this)">🤢 Mala digestión</button>
      </div>
      <div class="divider"></div>
      <p class="text-xs font-semibold mb-2" style="color:var(--sage)">Física / Funcional:</p>
      <div class="grid grid-cols-2 gap-2 mb-3">
        <button type="button" class="btn-check inf-fisica" data-val="Agujetas intensas" onclick="toggleActive(this)">💥 Agujetas top</button>
        <button type="button" class="btn-check inf-fisica" data-val="Molestia rodilla" onclick="toggleActive(this)">🦵 Rodilla</button>
        <button type="button" class="btn-check inf-fisica" data-val="Molestia tobillo/tendón" onclick="toggleActive(this)">🦶 Tobillo</button>
        <button type="button" class="btn-check inf-fisica" data-val="Sobrecarga espalda/trapecio" onclick="toggleActive(this)">🛡️ Espalda/Cuello</button>
      </div>
      <div class="mt-3">
        <button type="button" id="infOtroBtn" class="w-full btn-check" onclick="toggleOtroField()">
          🔍 Otra molestia o síntoma nuevo...
        </button>
        <div id="otroEspecificarWrapper" class="hidden mt-2">
          <input type="text" id="infOtroEspecificar" placeholder="¿Qué notas? Ej: Ampolla talón..." class="w-full p-2.5 text-sm">
        </div>
      </div>
    </div>

    <!-- BLOQUE 5: NOTAS GENERALES -->
    <div class="glass p-5 mb-5">
      <p class="section-label">🍂 Bitácora de Aventuras (Texto Libre)</p>
      <textarea id="notasGenerales" rows="2" placeholder="Cualquier otra sensación subjetiva de la semana, estrés del trabajo..." class="w-full px-3 py-2.5"></textarea>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">
      ✦ Guardar datos de la semana
    </button>
  </form>
</div>

<script>
// URL de Google Apps Script vinculada de forma exacta
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbybkoY2wsI9pxO5pXZAfAUHzoaUz-wQr4sJeao9efjySrVzeY5axk-BlYh16QOG6xbVtg/exec";

let valoracionEntreno = "Sin valorar";

const now = new Date();
const ws = new Date(now); ws.setDate(now.getDate() - now.getDay() + 1);
const we = new Date(ws);  we.setDate(ws.getDate() + 6);
const fmt = d => d.toLocaleDateString('es-ES', { day:'numeric', month:'short' });
document.getElementById('weekLabel').textContent = `Semana ${fmt(ws)} – ${fmt(we)}`;

function toggleActive(element) { element.classList.toggle('active'); }

function setEmoji(val) {
  valoracionEntreno = val;
  document.querySelectorAll('.emoji-btn').forEach(btn => btn.classList.remove('active'));
  if(val === 'Triste/Duro') document.getElementById('emojiSad').classList.add('active');
  if(val === 'Normal/Ok') document.getElementById('emojiNormal').classList.add('active');
  if(val === 'Feliz/Fluido') document.getElementById('emojiHappy').classList.add('active');
}

function toggleOtroField() {
  const btn = document.getElementById('infOtroBtn');
  const wrapper = document.getElementById('otroEspecificarWrapper');
  btn.classList.toggle('active');
  if (btn.classList.contains('active')) {
    wrapper.classList.remove('hidden');
    document.getElementById('infOtroEspecificar').focus();
  } else {
    wrapper.classList.add('hidden');
    document.getElementById('infOtroEspecificar').value = '';
  }
}

function getSelectedItems(className) {
  const items = [];
  document.querySelectorAll(className + '.active').forEach(btn => {
    if (btn.getAttribute('data-val')) items.push(btn.getAttribute('data-val'));
  });
  return items.join(', ');
}

async function handleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Registrando en Sheets…';

  let inflamacionOtro = "";
  if (document.getElementById('infOtroBtn').classList.contains('active')) {
    inflamacionOtro = document.getElementById('infOtroEspecificar').value;
  }

  const pesoKg = parseFloat(document.getElementById('peso').value);
  const alturaCm = parseFloat(document.getElementById('altura').value);
  let imcCalculado = "";
  if(pesoKg && alturaCm) {
    imcCalculado = (pesoKg / ((alturaCm / 100) * (alturaCm / 100))).toFixed(2);
  }

  const data = {
    fecha:                 new Date().toISOString(),
    peso:                  pesoKg,
    imc:                   imcCalculado,
    porcentaje_grasa:      document.getElementById('grasa').value || "",
    porcentaje_musculo:    document.getElementById('musculo').value || "",
    menstruacion:          document.getElementById('menstruacionBtn').classList.contains('active') ? "SÍ" : "NO",
    sueno_calidad:         document.getElementById('sueno').value,
    energia_fatiga:        document.getElementById('energia').value,
    tipo_entrenamiento:    document.getElementById('tipoEntreno').value,
    valoracion_entreno:    valoracionEntreno,
    notas_entrenamiento:   document.getElementById('notasEntreno').value,
    inflamacion_digestiva: getSelectedItems('.inf-digestiva'),
    inflamacion_fisica:    getSelectedItems('.inf-fisica'),
    inflamacion_otro:      inflamacionOtro,
    notas_generales:       document.getElementById('notasGenerales').value
  };

  let fraseRecibida = "¡Tu diario ha sido actualizado con éxito! Sigue sumando.";

  try {
    const response = await fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(data)
    });
    
    if (response.ok) {
      const resData = await response.json();
      if (resData && resData.frase) {
        fraseRecibida = resData.frase;
      }
    }
  } catch(err) {
    console.log("Error leyendo respuesta de Apps Script", err);
  }

  btn.innerHTML = '🌿 ¡Guardado con éxito!';
  btn.style.background = 'linear-gradient(135deg, rgba(156,182,159,.85) 0%, rgba(120,160,124,.75) 100%)';

  setTimeout(() => {
    btn.disabled = false;
    btn.innerHTML = '✦ Guardar datos de la semana';
    btn.style.background = '';
    
    // Muestra la píldora estoica / motivadora enviada desde tu Sheets
    alert(fraseRecibida);
    
    document.getElementById('checkinForm').reset();
    document.querySelectorAll('.btn-check').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('otroEspecificarWrapper').classList.add('hidden');
    valoracionEntreno = "Sin valorar";
  }, 1000);
}
</script>
</body>
</html>
